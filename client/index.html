<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <title>목재 견적 계산기</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function () {
        var help =
          '<div style="padding:28px;max-width:520px;margin:0 auto;font-family:system-ui,sans-serif;line-height:1.55;color:#191f28">' +
          "<h1 style=\"font-size:18px;margin:0 0 10px\">이 화면이 보이면</h1>" +
          "<p style=\"margin:0 0 12px;font-size:14px\">이 <strong>index.html</strong>을 탐색기에서 더블클릭(<code>file://</code>)으로 연 상태일 가능성이 큽니다. " +
          "이때는 <code>&lt;script src=&quot;/src/main.tsx&quot;&gt;</code> 가 로드되지 않아 <strong>빈 화면</strong>이 됩니다.</p>" +
          "<p style=\"margin:0 0 12px;font-size:14px\"><strong>해결:</strong> 터미널에서 프로젝트의 <code>client</code> 폴더로 이동한 뒤 <code>npm install</code> → <code>npm run dev</code> 를 실행하고, " +
          "터미널에 나온 주소(예: <code>http://localhost:5173</code>)를 크롬 주소창에 붙여 넣으세요.</p>" +
          "<p style=\"margin:0;font-size:13px;color:#4e5968\">빌드된 단일 HTML(<code>dist/index.html</code> 등)을 쓸 때도 <code>file://</code> 대신 <code>npm run preview</code> 또는 <code>npx serve</code>로 HTTP로 여는 것이 안전합니다.</p>" +
          "</div>";
        function show() {
          var r = document.getElementById("root");
          if (!r || r.getAttribute("data-groot-mounted") === "1") return;
          r.innerHTML = help;
        }
        window.addEventListener(
          "error",
          function (e) {
            var t = e && e.target;
            if (t && t.tagName === "SCRIPT") show();
          },
          true
        );
        setTimeout(show, 1800);
      })();
    </script>
  </body>
</html>
